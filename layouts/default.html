<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f6f8fa;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 8px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        nav {
            background: white;
            padding: 15px 0;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        nav a {
            color: #1f6feb;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #0969da;
        }

        main {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        main h1 {
            color: #1f6feb;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        main h2 {
            color: #764ba2;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        main p {
            margin-bottom: 15px;
            text-align: justify;
        }

        main ul, main ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        main li {
            margin-bottom: 8px;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px 20px;
            color: #666;
            font-size: 0.9em;
        }

        footer a {
            color: #1f6feb;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }

            main {
                padding: 20px;
            }

            nav ul {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 {{ site.title }}</h1>
            <p>{{ site.description }}</p>
        </header>

        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/privacy-policy">Privacy Policy</a></li>
                <li><a href="/terms-of-service">Terms of Service</a></li>
            </ul>
        </nav>

        <main>
            {{ content }}
        </main>

        <footer>
            <p>&copy; 2026 Günni AI. All rights reserved.</p>
            <p>Questions? Contact us at <a href="mailto:support@example.com">support@example.com</a></p>
            <p><small>Last Updated: {{ site.time | date: "%B %d, %Y" }}</small></p>
        </footer>
    </div>
</body>
</html>
